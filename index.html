<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Daily Practice - Học JavaScript mỗi ngày</title>
    <meta name="description"
        content="Nền tảng luyện tập JavaScript đơn giản cho người mới bắt đầu. Viết code, chạy thử và sửa lỗi ngay trên trình duyệt.">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">JS</div>
                    <div>
                        <h1>JS Daily Practice</h1>
                        <p class="subtitle">Train code mỗi ngày</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="btn-theme" class="btn btn-outline btn-icon-only" title="Đổi giao diện Sáng/Tối">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon-light"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                    <button id="btn-save" class="btn btn-primary" title="Lưu code vào trình duyệt">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Save Code
                    </button>
                    <button id="btn-reset" class="btn btn-outline" title="Quay lại bài học mặc định">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                        Reset Lesson
                    </button>
                    <div class="layout-toggles">
                        <button id="btn-layout-vertical" class="btn btn-icon-only active" title="Layout Trên - Dưới">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="12" x2="21" y2="12"></line></svg>
                        </button>
                        <button id="btn-layout-horizontal" class="btn btn-icon-only" title="Layout Trái - Phải">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="3" x2="12" y2="21"></line></svg>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="app-main">
            <div class="workspace">
                <!-- Editor & Console Area -->
                <section class="editor-section" id="editor-section">
                    <div class="section-header">
                        <span class="label">Code Editor</span>
                        <div class="actions">
                            <button id="btn-clear-code" class="btn-icon">Clear</button>
                            <button id="btn-run" class="btn btn-success">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg>
                                Run Code
                            </button>
                        </div>
                    </div>
                    <div class="editor-wrapper">
                        <!-- Lớp hiển thị màu sắc (Đã loại bỏ thẻ code để tránh lệch font) -->
                        <pre id="highlighting-content" aria-hidden="true"></pre>
                        <!-- Lớp nhập liệu -->
                        <textarea id="code-editor" spellcheck="false"></textarea>
                    </div>
                </section>

                <div id="workspace-resizer" class="resizer" title="Kéo để thay đổi kích thước"></div>

                <!-- Console Output -->
                <section class="console-section" id="console-section">
                    <div class="section-header">
                        <span class="label">Console Output</span>
                        <button id="btn-clear-console" class="btn-icon" title="Xóa log">Clear Console</button>
                    </div>
                    <div id="console-output" class="console-body">
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
